name: Go tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "playground/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "playground/**"
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race detector)
        run: go test -race ./...
